<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        * {
            margin: 0;
        }

        .box {
            width: 200px;
            height: 200px;
            background-color: aquamarine;
            color: red;
            /* text-align: center; */

            /******************* Border ******************/
            /* 
            border-width: 5px;
            border-style: solid;
            border-color: yellow; */

            /* border: 5px solid orange; */

            /* border-top: 5px solid black;
            border-left: 5px dotted red;
            border-right: 5px dashed yellow;
            border-bottom: 5px double purple; */

            border: 5px solid rgb(216, 95, 86);

            /*********** Margin *********************/

            /* margin: 30px; */

            /* margin: 10px 100px; */

            /* margin-top: 50px; */

            /* margin-left: 50px; */

            /* margin-bottom: 50px;

             margin-right: 50px; */

            /* margin: 50px 0px 0px 20px; */

            margin: 50px;

            /************* padding *********************/

            /* padding: 10px; */

            /* padding-left: 20px; */
            /* padding-top: 50px; */
            /* padding-bottom: 30px; */
            /* padding-right: 50px; */

            /* padding: 50px 10px; */

            /* border-radius: 50%; */

            /* outline-width: 5px;

            background-image: url(./image.png);
