<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <style>
        .box {
            /* width: 200px; */
            height: 100px;
            background-color: aqua;
            padding: 10px;
            margin: 10px;
        }

        .container1 {
            background-color: red;
            /* display: block; */
            display: inline;
            width: 300px;
            height: 100px;
        }

        .container2 {
            background-color: green;
            display: inline;
        }

        .container3 {
            background-color: yellow;
        }

        .inline {
            background-color: blue;
            color: black;
            padding: 10px;
            margin: 10px;
            /* height: 200px; */
            /* width: 200px; */
        }

        .span1 {
            background-color: purple;
            /* display: inline; */
            /* display: block;
            height: 100px;
            width: 200px; */
        }

        .span2 {
            background-color: green;
            display: block;
            /* display: none; */
            /* visibility: visible; */
            /* visibility: collapse; */
            /* visibility: hidden; */
            height: 100px;
            width: 200px;
        }

        .span3 {
            background-color: red;
        }
    </style>
</head>

<body>

    <!-- Block -->
    <div class="box container1">
        Container 1
    </div>
    <div class="box container2">
        Container 2
    </div>
    <div class="box container3">
        Container 3
    </div>

    <!-- Span  -->

    <span class="inline span1">Span 1</span>
    <span class="inline span2">Span 2</span>
    <span class="inline span3">Span 3</span>

</body>

</html>
